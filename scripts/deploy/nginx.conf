# scripts/deploy/nginx.conf
#
# Production nginx config for the contract review API.
# Copy to /etc/nginx/sites-available/contract-review and symlink to sites-enabled/.
#
# Before use:
#   - Replace YOUR_DOMAIN with your actual domain (or leave _ for IP-only access)
#   - Run: sudo certbot --nginx -d YOUR_DOMAIN  to get HTTPS (fills in the ssl_* lines)

server {
    listen 80;
    server_name YOUR_DOMAIN;      # e.g. api.example.com  or  _  for any

    # Redirect HTTP → HTTPS once certbot has provisioned a cert.
    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;     # allow .txt file uploads up to 10 MB

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Review jobs run for 30-90s — don't let nginx time out on them.
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
    }
}

